[colors]
white   = #ffffff
black   = #000000
mute    = #696969

; ─────────────────────────────────────────────────────────────────────────────
; BAR
; ─────────────────────────────────────────────────────────────────────────────

[bar/main]
width          = 100%
height         = 30
offset-x       = 0
offset-y       = 0

top            = true
fixed-center   = false

font-0 = JetBrainsMono Nerd Font:size=12:antialias=true
font-1 = JetBrainsMono Nerd Font:size=16:antialias=true
font-2 = DejaVu Sans:size=12:antialias=true

background     = #99000000
foreground     = ${colors.white}

border-top-size  = 1
border-top-color = ${colors.black}

tray-position     = none
enable-ipc        = true
override-redirect = true

modules-left   = start xmonad-log
modules-center =
modules-right  = capslock updates volume volume-output brightness bluetooth battery space vpn network cpu-temp sys-usage weather speedtest rofi-theme yt-dl wallpaper screenshot automount page calendar power

; ─────────────────────────────────────────────────────────────────────────────
; LEFT
; ─────────────────────────────────────────────────────────────────────────────

[module/start]
type       = custom/ipc
hook-0     = ${HOME}/.config/polybar/scripts/run ${HOME}/.config/barlib/com/start/index
initial    = 1

[module/xmonad-log]
type       = custom/script
exec       = ${HOME}/.config/polybar/scripts/xmonad-log
tail       = true
label      = %output%

; ─────────────────────────────────────────────────────────────────────────────
; RIGHT — IPC-driven; clicks run action then re-fire the hook
; ─────────────────────────────────────────────────────────────────────────────

[module/capslock]
; capslock state requires polling — no IPC trigger available
type       = custom/script
exec       = ${HOME}/.config/polybar/scripts/run ${HOME}/.config/barlib/com/capslock/index
interval   = 1

[module/updates]
type        = custom/script
exec        = ${HOME}/.config/polybar/scripts/run ${HOME}/.config/barlib/com/updates/index
interval    = 3600
click-left  = bash -c '${HOME}/.config/barlib/com/updates/index show; polybar-msg action "#updates.hook.0"'
click-right = bash -c '${HOME}/.config/barlib/com/updates/index view_log; polybar-msg action "#updates.hook.0"'

[module/volume]
type         = custom/ipc
hook-0       = ${HOME}/.config/polybar/scripts/run ${HOME}/.config/barlib/com/volume/index
initial      = 1
click-left   = bash -c '${HOME}/.config/barlib/com/volume/index volume_jump;  polybar-msg action "#volume.hook.0"'
click-middle = bash -c '${HOME}/.config/barlib/com/volume/index mute;         polybar-msg action "#volume.hook.0"'
scroll-up    = bash -c '${HOME}/.config/barlib/com/volume/index volume_up;    polybar-msg action "#volume.hook.0"'
scroll-down  = bash -c '${HOME}/.config/barlib/com/volume/index volume_down;  polybar-msg action "#volume.hook.0"'

[module/volume-output]
type         = custom/ipc
hook-0       = ${HOME}/.config/polybar/scripts/run ${HOME}/.config/barlib/com/volume_output/index
initial      = 1
click-left   = bash -c '${HOME}/.config/barlib/com/volume_output/index info;   polybar-msg action "#volume-output.hook.0"'
click-right  = bash -c '${HOME}/.config/barlib/com/volume_output/index toggle; polybar-msg action "#volume-output.hook.0"'

[module/brightness]
type         = custom/ipc
hook-0       = ${HOME}/.config/polybar/scripts/run ${HOME}/.config/barlib/com/brightness/index
initial      = 1
scroll-up    = bash -c '${HOME}/.config/barlib/com/brightness/index up;   polybar-msg action "#brightness.hook.0"'
scroll-down  = bash -c '${HOME}/.config/barlib/com/brightness/index down; polybar-msg action "#brightness.hook.0"'

[module/bluetooth]
type         = custom/ipc
hook-0       = ${HOME}/.config/polybar/scripts/run ${HOME}/.config/barlib/com/bluetooth/index
initial      = 1
click-left   = bash -c '${HOME}/.config/barlib/com/bluetooth/index open;       polybar-msg action "#bluetooth.hook.0"'
click-middle = bash -c '${HOME}/.config/barlib/com/bluetooth/index toggle;     polybar-msg action "#bluetooth.hook.0"'
click-right  = bash -c '${HOME}/.config/barlib/com/bluetooth/index reset;      polybar-msg action "#bluetooth.hook.0"'
scroll-up    = bash -c '${HOME}/.config/barlib/com/bluetooth/index cycle_up;   polybar-msg action "#bluetooth.hook.0"'
scroll-down  = bash -c '${HOME}/.config/barlib/com/bluetooth/index cycle_down; polybar-msg action "#bluetooth.hook.0"'

[module/battery]
type        = custom/ipc
hook-0      = ${HOME}/.config/polybar/scripts/run ${HOME}/.config/barlib/com/battery/index
initial     = 1
click-left  = bash -c '${HOME}/.config/barlib/com/battery/index show_time; polybar-msg action "#battery.hook.0"'

[module/space]
type        = custom/ipc
hook-0      = ${HOME}/.config/polybar/scripts/run ${HOME}/.config/barlib/com/space/index
initial     = 1
click-left  = bash -c '${HOME}/.config/barlib/com/space/index show;   polybar-msg action "#space.hook.0"'
click-right = bash -c '${HOME}/.config/barlib/com/space/index toggle; polybar-msg action "#space.hook.0"'

[module/vpn]
type        = custom/ipc
hook-0      = ${HOME}/.config/polybar/scripts/run ${HOME}/.config/barlib/com/vpn/index
initial     = 1
click-left  = bash -c '${HOME}/.config/barlib/com/vpn/index up;   polybar-msg action "#vpn.hook.0"'
click-right = bash -c '${HOME}/.config/barlib/com/vpn/index down; polybar-msg action "#vpn.hook.0"'

[module/network]
type         = custom/ipc
hook-0       = ${HOME}/.config/polybar/scripts/run ${HOME}/.config/barlib/com/network/index
initial      = 1
click-left   = bash -c '${HOME}/.config/barlib/com/network/index connect; polybar-msg action "#network.hook.0"'
click-middle = bash -c '${HOME}/.config/barlib/com/network/index toggle;  polybar-msg action "#network.hook.0"'
click-right  = bash -c '${HOME}/.config/barlib/com/network/index traffic; polybar-msg action "#network.hook.0"'

[module/cpu-temp]
type        = custom/ipc
hook-0      = ${HOME}/.config/polybar/scripts/run ${HOME}/.config/barlib/com/cpu_temp/index
initial     = 1
click-left  = bash -c '${HOME}/.config/barlib/com/cpu_temp/index top; polybar-msg action "#cpu-temp.hook.0"'

[module/sys-usage]
type        = custom/ipc
hook-0      = ${HOME}/.config/polybar/scripts/run ${HOME}/.config/barlib/com/sys_usage/index
initial     = 1

[module/weather]
type        = custom/ipc
hook-0      = ${HOME}/.config/polybar/scripts/run ${HOME}/.config/barlib/com/weather/index
initial     = 1
click-left  = ${HOME}/.config/barlib/com/weather/index run

[module/speedtest]
type        = custom/ipc
hook-0      = ${HOME}/.config/polybar/scripts/run ${HOME}/.config/barlib/com/speedtest/index
initial     = 1
click-left  = ${HOME}/.config/barlib/com/speedtest/index show
click-right = ${HOME}/.config/barlib/com/speedtest/index run

[module/rofi-theme]
type        = custom/ipc
hook-0      = ${HOME}/.config/polybar/scripts/run ${HOME}/.config/barlib/com/rofi_theme/index
initial     = 1
click-left  = bash -c '${HOME}/.config/barlib/com/rofi_theme/index change; polybar-msg action "#rofi-theme.hook.0"'

[module/yt-dl]
type        = custom/ipc
hook-0      = ${HOME}/.config/polybar/scripts/run ${HOME}/.config/barlib/com/yt_dl/index
initial     = 1
click-left  = ${HOME}/.config/barlib/com/yt_dl/index download
click-right = bash -c '${HOME}/.config/barlib/com/yt_dl/index toggle; polybar-msg action "#yt-dl.hook.0"'

[module/wallpaper]
type         = custom/ipc
hook-0       = ${HOME}/.config/polybar/scripts/run ${HOME}/.config/barlib/com/wallpaper/index
initial      = 1
click-left   = bash -c '${HOME}/.config/barlib/com/wallpaper/index picker;     polybar-msg action "#wallpaper.hook.0"'
click-middle = bash -c '${HOME}/.config/barlib/com/wallpaper/index lock_image; polybar-msg action "#wallpaper.hook.0"'
click-right  = bash -c '${HOME}/.config/barlib/com/wallpaper/index change;     polybar-msg action "#wallpaper.hook.0"'

[module/screenshot]
type         = custom/ipc
hook-0       = ${HOME}/.config/polybar/scripts/run ${HOME}/.config/barlib/com/screenshot/index
initial      = 1
click-left   = bash -c '${HOME}/.config/barlib/com/screenshot/index take;   polybar-msg action "#screenshot.hook.0"'
click-middle = bash -c '${HOME}/.config/barlib/com/screenshot/index clear;  polybar-msg action "#screenshot.hook.0"'
click-right  = bash -c '${HOME}/.config/barlib/com/screenshot/index toggle; polybar-msg action "#screenshot.hook.0"'

[module/automount]
type        = custom/ipc
hook-0      = ${HOME}/.config/polybar/scripts/run ${HOME}/.config/barlib/com/automount/index
initial     = 1
click-left  = bash -c '${HOME}/.config/barlib/com/automount/index show; polybar-msg action "#automount.hook.0"'

[module/page]
type        = custom/ipc
hook-0      = ${HOME}/.config/polybar/scripts/run ${HOME}/.config/barlib/com/page/index
initial     = 1
click-left  = bash -c '${HOME}/.config/barlib/com/page/index toggle; ${HOME}/.config/polybar/scripts/refresh'

[module/calendar]
type        = custom/script
exec        = ${HOME}/.config/polybar/scripts/run ${HOME}/.config/barlib/com/calendar/index
interval    = 1
click-left  = ${HOME}/.config/barlib/com/calendar/index toggle
click-right = ${HOME}/.config/barlib/com/calendar/index show_calendar

[module/power]
type        = custom/script
exec        = ${HOME}/.config/polybar/scripts/run ${HOME}/.config/barlib/com/power/index
initial     = 1
click-left  = ${HOME}/.config/barlib/com/power/index open
